<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>股票技术指标监控 - Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            background: rgba(255,255,255,0.95);
            padding: 30px;
            border-radius: 16px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .header h1 { 
            font-size: 28px; 
            color: #333;
            margin-bottom: 10px;
        }
        .header .subtitle {
            color: #666;
            font-size: 14px;
        }
        .header .update-time {
            color: #999;
            font-size: 12px;
            margin-top: 10px;
        }

        /* ===== 非交易日提示横幅 ===== */
        .non-trading-banner {
            display: none;
            background: #fff8e1;
            border: 1px solid #ffe082;
            border-radius: 10px;
            padding: 14px 20px;
            margin-bottom: 20px;
            color: #7b5800;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .non-trading-banner.hidden { display: none !important; }
        .non-trading-banner .banner-icon { font-size: 20px; }
        .non-trading-banner .banner-text strong { display: block; font-size: 15px; margin-bottom: 2px; }
        /* ============================= */
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: rgba(255,255,255,0.95);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }
        .stat-card .number { 
            font-size: 36px; 
            font-weight: bold; 
            color: #667eea; 
        }
        .stat-card .label { 
            color: #666; 
            margin-top: 5px;
            font-size: 14px;
        }
        
        .section {
            background: rgba(255,255,255,0.95);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .section-title {
            font-size: 20px;
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
            padding-left: 12px;
            border-left: 4px solid #667eea;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        .error {
            background: #fff3f3;
            border: 1px solid #ffcdd2;
            color: #c62828;
            padding: 15px;
            border-radius: 8px;
            margin: 10px 0;
        }
        .empty {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        
        .stock-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid #e9ecef;
        }
        .stock-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .stock-name { 
            font-size: 18px; 
            font-weight: bold;
            color: #333;
        }
        .stock-code { 
            color: #999; 
            font-size: 14px;
            margin-left: 8px;
        }
        .stock-price {
            text-align: right;
        }
        .price { 
            font-size: 24px; 
            font-weight: bold;
            color: #333;
        }
        .change { 
            font-size: 14px; 
            font-weight: bold;
        }
        .change.up { color: #e74c3c; }
        .change.down { color: #27ae60; }
        
        .trend-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        .trend-badge.bull { background: #ffebee; color: #c62828; }
        .trend-badge.bear { background: #e8f5e9; color: #2e7d32; }
        .trend-badge.neutral { background: #fff3e0; color: #ef6c00; }
        
        .indicators {
            display: flex;
            gap: 12px;
            margin: 15px 0;
            flex-wrap: wrap;
        }
        .indicator {
            background: #e9ecef;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 13px;
        }
        .indicator span { color: #666; }
        
        .signals {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .signal {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            border-radius: 8px;
            font-size: 14px;
        }
        .signal.buy { background: #ffebee; border-left: 3px solid #e74c3c; }
        .signal.sell { background: #e8f5e9; border-left: 3px solid #27ae60; }
        .signal.neutral { background: #fff3e0; border-left: 3px solid #f39c12; }
        .signal-icon { margin-right: 10px; font-size: 18px; }
        .signal-content { flex: 1; }
        .signal-type { font-weight: bold; margin-bottom: 2px; }
        .signal-desc { color: #666; font-size: 12px; }
        .signal-strength {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
        }
        .signal-strength.strong { background: #e74c3c; color: white; }
        .signal-strength.medium { background: #f39c12; color: white; }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e9ecef;
        }
        th {
            background: #f8f9fa;
            font-weight: 600;
            color: #666;
            font-size: 13px;
        }
        td {
            font-size: 14px;
        }
        tr:hover {
            background: #f8f9fa;
        }
        
        .status-ok { color: #27ae60; }
        .status-fail { color: #e74c3c; }
        .status-skip { color: #999; }
        
        .refresh-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            margin-top: 10px;
        }
        .refresh-btn:hover {
            background: #5a6fd6;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>📈 股票技术指标监控系统</h1>
            <div class="subtitle">基于akshare开源数据 | 支持MA、MACD、RSI、布林带、KDJ</div>
            <div class="update-time" id="update-time">加载中...</div>
        </div>

        <!-- 非交易日提示横幅（默认隐藏，数据加载后按需显示） -->
        <div class="non-trading-banner hidden" id="non-trading-banner">
            <span class="banner-icon">📅</span>
            <div class="banner-text">
                <strong>当前为非交易日，展示上一交易日数据</strong>
                <span id="banner-last-time"></span>
            </div>
        </div>
        
        <!-- Stats -->
        <div class="stats">
            <div class="stat-card">
                <div class="number" id="stat-total">-</div>
                <div class="label">监控股票</div>
            </div>
            <div class="stat-card">
                <div class="number" id="stat-alerts">-</div>
                <div class="label">今日信号</div>
            </div>
            <div class="stat-card">
                <div class="number" id="stat-strong">-</div>
                <div class="label">强势股票</div>
            </div>
            <div class="stat-card">
                <div class="number" id="stat-ok">-</div>
                <div class="label">成功更新</div>
            </div>
        </div>
        
        <!-- Signals Section -->
        <div class="section">
            <div class="section-title">🔔 最新信号</div>
            <div id="signals-container">
                <div class="loading">加载中...</div>
            </div>
        </div>
        
        <!-- Run Status Section -->
        <div class="section">
            <div class="section-title">📊 运行状态</div>
            <div id="run-status-container">
                <div class="loading">加载中...</div>
            </div>
            <button class="refresh-btn" onclick="loadData()">🔄 刷新数据</button>
        </div>
    </div>

    <script>
        // 加载数据
        async function loadData() {
            try {
                document.getElementById('signals-container').innerHTML = '<div class="loading">加载中...</div>';
                document.getElementById('run-status-container').innerHTML = '<div class="loading">加载中...</div>';
                
                const [signalsResp, runResp] = await Promise.all([
                    fetch('data/signals.json?t=' + Date.now()),
                    fetch('data/latest_run.json?t=' + Date.now())
                ]);

                if (!signalsResp.ok) throw new Error(`signals.json 请求失败 (HTTP ${signalsResp.status})`);
                if (!runResp.ok)     throw new Error(`latest_run.json 请求失败 (HTTP ${runResp.status})`);
                
                const signalsData = await signalsResp.json();
                const runData     = await runResp.json();
                
                renderSignals(signalsData);
                renderRunStatus(runData);
                updateStats(signalsData, runData);
                
            } catch (e) {
                console.error('加载数据失败:', e);
                document.getElementById('signals-container').innerHTML = 
                    `<div class="error">数据加载失败: ${e.message}<br>请确保数据文件已生成</div>`;
                document.getElementById('run-status-container').innerHTML = 
                    `<div class="error">运行状态加载失败</div>`;
            }
        }
        
        // 渲染信号列表
        function renderSignals(data) {
            const container = document.getElementById('signals-container');
            const signals = data.signals || [];

            // ===== 非交易日横幅处理 =====
            const banner = document.getElementById('non-trading-banner');
            if (data.is_last_trading) {
                banner.classList.remove('hidden');
                const lastTime = data.update_time
                    ? new Date(data.update_time).toLocaleString('zh-CN')
                    : '时间未知';
                document.getElementById('banner-last-time').textContent = '数据时间：' + lastTime;
            } else {
                banner.classList.add('hidden');
            }
            // ============================
            
            if (signals.length === 0) {
                container.innerHTML = '<div class="empty">📭 暂无信号</div>';
                return;
            }
            
            signals.sort((a, b) => b.score - a.score);
            
            let html = '';
            signals.forEach(alert => {
                const trendClass   = alert.trend === '强势' ? 'bull' : (alert.trend === '弱势' ? 'bear' : 'neutral');
                const changeClass  = alert.change_pct > 0 ? 'up' : 'down';
                const changeSymbol = alert.change_pct > 0 ? '+' : '';
                
                html += `
                <div class="stock-card">
                    <div class="stock-header">
                        <div>
                            <span class="stock-name">${alert.name}</span>
                            <span class="stock-code">${alert.code}</span>
                            <span class="trend-badge ${trendClass}">${alert.trend}</span>
                        </div>
                        <div class="stock-price">
                            <div class="price">¥${alert.price}</div>
                            <div class="change ${changeClass}">${changeSymbol}${alert.change_pct}%</div>
                        </div>
                    </div>
                    
                    <div class="indicators">
                        <div class="indicator">MA5: <span>${alert.ma5}</span></div>
                        <div class="indicator">MA10: <span>${alert.ma10}</span></div>
                        <div class="indicator">MA20: <span>${alert.ma20}</span></div>
                        <div class="indicator">RSI: <span>${alert.rsi ? alert.rsi.toFixed(1) : '-'}</span></div>
                        <div class="indicator">MACD: <span>${alert.macd ? alert.macd.toFixed(4) : '-'}</span></div>
                    </div>
                    
                    <div class="signals">
                        ${alert.signals.map(sig => {
                            const signalClass  = sig.action && sig.action.includes('买入') ? 'buy' :
                                                (sig.action && sig.action.includes('卖出') ? 'sell' : 'neutral');
                            const strengthClass = sig.strength === '强' ? 'strong' : 'medium';
                            const icon = signalClass === 'buy' ? '📈' : (signalClass === 'sell' ? '📉' : '⚠️');
                            return `
                            <div class="signal ${signalClass}">
                                <span class="signal-icon">${icon}</span>
                                <div class="signal-content">
                                    <div class="signal-type">[${sig.indicator}] ${sig.type}</div>
                                    <div class="signal-desc">${sig.desc}</div>
                                </div>
                                <span class="signal-strength ${strengthClass}">${sig.strength}</span>
                            </div>
                            `;
                        }).join('')}
                    </div>
                </div>
                `;
            });
            
            container.innerHTML = html;
        }
        
        // 渲染运行状态
        function renderRunStatus(run) {
            const container = document.getElementById('run-status-container');
            
            if (!run || !run.time) {
                container.innerHTML = '<div class="empty">暂无运行记录</div>';
                return;
            }
            
            const okCount   = (run.ok   || []).length;
            const failCount = (run.fail || []).length;
            const noteMap   = { 'non-trading-day': '⏸️ 非交易日（展示上一交易日数据）' };
            const noteText  = noteMap[run.note] || run.note || '';
            
            let html = `
            <table>
                <tr><th>项目</th><th>值</th></tr>
                <tr>
                    <td>最后运行时间</td>
                    <td>${new Date(run.time).toLocaleString('zh-CN')}</td>
                </tr>
                <tr>
                    <td>成功处理</td>
                    <td class="status-ok">${okCount} 只</td>
                </tr>
                <tr>
                    <td>处理失败</td>
                    <td class="${failCount > 0 ? 'status-fail' : 'status-ok'}">${failCount} 只</td>
                </tr>
                <tr>
                    <td>信号数量</td>
                    <td>${run.alerts_count || 0} 个</td>
                </tr>
            `;
            
            if (noteText) {
                html += `<tr><td>备注</td><td class="status-skip">${noteText}</td></tr>`;
            }
            
            html += '</table>';
            
            if (failCount > 0 && run.fail) {
                html += `
                <details style="margin-top: 15px;">
                    <summary style="cursor: pointer; color: #666;">查看失败详情 (${failCount})</summary>
                    <ul style="margin-top: 10px; color: #666;">
                        ${run.fail.map(f => `<li>${f.name || f.code}: ${f.error || '未知错误'}</li>`).join('')}
                    </ul>
                </details>
                `;
            }
            
            container.innerHTML = html;
        }
        
        // 更新统计数字
        function updateStats(signalsData, runData) {
            const signals     = signalsData.signals || [];
            const strongCount = signals.filter(s => s.trend === '强势').length;
            
            document.getElementById('stat-total').textContent  = signals.length;
            document.getElementById('stat-alerts').textContent = signals.length;
            document.getElementById('stat-strong').textContent = strongCount;
            document.getElementById('stat-ok').textContent     = (runData.ok || []).length;
            
            if (signalsData.update_time) {
                const timeStr  = new Date(signalsData.update_time).toLocaleString('zh-CN');
                const suffix   = signalsData.is_last_trading ? '（上一交易日）' : '';
                document.getElementById('update-time').textContent = `更新时间: ${timeStr}${suffix}`;
            }
        }
        
        document.addEventListener('DOMContentLoaded', loadData);
        setInterval(loadData, 60000);
    </script>
</body>
</html>
