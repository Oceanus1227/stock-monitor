# ============================================================
# 股票监控数据刷新 Workflow
# ============================================================

name: Refresh Stock Data

on:
  schedule:
    - cron: '*/15 1-7 * * 1-5'
    - cron: '5 7 * * 1-5'

  workflow_dispatch:
    inputs:
      force_run:
        description: '强制运行（忽略交易日校验）'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

concurrency:
  group: refresh-stock-data
  cancel-in-progress: true

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build stock data
        run: python scripts/build_data.py
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          FORCE_RUN: ${{ github.event.inputs.force_run || 'false' }}

      # ── Step 5: 提交并推送数据 ────────────────────────────
      - name: Commit and push data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # 【修复1】加 --ignore-missing，文件不存在时静默跳过不报错
          # 解决 state.json 等文件首次运行前不存在导致 exit 128 的问题
          git add --ignore-missing \
            data/signals.json \
            data/latest_run.json \
            data/state.json \
            index.html

          COMMIT_TIME=$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M CST')

          # 【修复2】原版写法：
          #   git diff --cached --quiet || git commit -m "..." && git push
          # 因为 shell 里 && 优先级高于 ||，实际解析为：
          #   git diff --cached --quiet || (git commit -m "..." && git push)
          # 看起来没问题，但"无变更时"git diff 返回 0，
          # 后面的 && git push 会被短路跳过——然而如果 commit 失败，
          # push 也会被跳过且整体返回非零，导致 step 报红。
          # 改用 if 判断，逻辑清晰且不依赖运算符优先级：
          if git diff --cached --quiet; then
            echo "✅ 无变更，跳过提交"
          else
            git commit -m "data: update ${COMMIT_TIME}"
            git push
          fi

        continue-on-error: false
